site_name: lcf-strain-life
site_description: AI-agent-native toolkit for fatigue analysis of materials
repo_url: https://github.com/dfieser/lcf-strain-life
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Physics: physics.md
  - API reference: api.md
  - Agent usage: AGENT_USAGE.md
  - Reference:
      - Scientific reference: SCIENTIFIC_REFERENCE.md
      - Equations and labels: reference/Equations_and_Labels.md
      - Analysis notes: reference/LCF_Analysis_Notes.md
  - Design:
      - Workflow: design/WORKFLOW.md
  - Decisions: decisions/README.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
