name: publish

# Publishes to PyPI when a version tag (vX.Y.Z) is pushed, using PyPI Trusted
# Publishing (OIDC), so no API token is stored. To release: bump the version,
# commit, then `git tag vX.Y.Z && git push origin vX.Y.Z`. See RELEASING.md.
#
# One-time PyPI setup is required first (a pending trusted publisher with this
# repo, the workflow filename publish.yml, and the environment name pypi).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: build and upload to PyPI
    runs-on: ubuntu-latest
    environment: pypi          # must match the trusted-publisher config on PyPI
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
